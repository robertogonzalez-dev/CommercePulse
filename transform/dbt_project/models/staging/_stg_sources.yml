version: 2

sources:
  - name: bronze
    schema: bronze
    description: "Raw data ingested by the CommercePulse Python pipeline. All tables include audit columns: _ingested_at, _batch_id, _source_file, _row_hash."

    tables:
      - name: raw_customers
        description: "Customer master records loaded from CSV. Full refresh each run."
        columns:
          - name: customer_id
            tests: [unique, not_null]
          - name: email
            tests: [unique, not_null]
          - name: registration_date
            tests: [not_null]

      - name: raw_products
        description: "Product catalogue loaded from CSV. Full refresh each run."
        columns:
          - name: product_id
            tests: [unique, not_null]
          - name: sku
            tests: [unique, not_null]
          - name: product_name
            tests: [not_null]
          - name: category_l1
            tests: [not_null]

      - name: raw_orders
        description: "Customer orders loaded incrementally from CSV."
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: customer_id
            tests: [not_null]
          - name: order_date
            tests: [not_null]
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: ["pending", "processing", "shipped", "delivered", "cancelled", "returned"]

      - name: raw_order_items
        description: "Line items for each order. Loaded incrementally."
        columns:
          - name: order_item_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: quantity
            tests: [not_null]

      - name: raw_payments
        description: "Payment transactions linked to orders. Loaded incrementally."
        columns:
          - name: payment_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: payment_date
            tests: [not_null]
          - name: amount
            tests: [not_null]
          - name: transaction_id
            tests: [unique, not_null]

      - name: raw_refunds
        description: "Refund records linked to orders and customers. Loaded incrementally."
        columns:
          - name: refund_id
            tests: [unique, not_null]
          - name: order_id
            tests: [not_null]
          - name: customer_id
            tests: [not_null]
          - name: refund_date
            tests: [not_null]

      - name: raw_inventory
        description: "Warehouse inventory snapshots per product. Full refresh each run."
        columns:
          - name: inventory_id
            tests: [unique, not_null]
          - name: product_id
            tests: [not_null]
          - name: warehouse_id
            tests: [not_null]

      - name: raw_marketing_spend
        description: "Paid campaign spend and performance data. Full refresh each run."
        columns:
          - name: spend_id
            tests: [unique, not_null]
          - name: campaign_id
            tests: [not_null]
          - name: channel
            tests: [not_null]
          - name: start_date
            tests: [not_null]

      - name: raw_web_sessions
        description: "Web session events including funnel steps and UTM attribution. Loaded incrementally."
        columns:
          - name: session_id
            tests: [unique, not_null]
          - name: session_start
            tests: [not_null]

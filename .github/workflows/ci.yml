name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint · Type Check · Unit Tests ──────────────────────────────────
  lint-test:
    name: Lint · Type Check · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy ingestion/ api/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=ingestion --cov-report=term-missing

  # ── Job 2: dbt Compile + Test ──────────────────────────────────────────────
  dbt-validate:
    name: dbt Compile · Test
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialise Bronze schema
        run: python -c "from ingestion.warehouse import initialise_schema; initialise_schema()"

      - name: Run ingestion pipeline
        run: python run_pipeline.py

      - name: dbt deps
        working-directory: transform/dbt_project
        run: dbt deps --profiles-dir .

      - name: dbt compile
        working-directory: transform/dbt_project
        run: dbt compile --profiles-dir .

      - name: dbt run + test
        working-directory: transform/dbt_project
        run: |
          dbt run  --profiles-dir . --no-partial-parse
          dbt test --profiles-dir . --no-partial-parse

  # ── Job 3: Docker Build Validation ────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build pipeline image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.pipeline
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.streamlit
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
